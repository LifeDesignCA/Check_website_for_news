name: 🏠 Liliskane Daily Monitor

on:
  schedule:
    # 08:00 UTC = 09:00 Maroc (GMT+1 permanent depuis 2018)
    - cron: "0 8 * * *"

  # Permet de lancer manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest

    # Nécessaire pour que le job puisse commit/push le CSV mis à jour
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour un git diff propre

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Monitoring ────────────────────────────────────────────────────────
      - name: Run monitoring script
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # Optionnel — décommentez si vous n'utilisez pas Gmail :
          # SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          # SMTP_PORT:     ${{ secrets.SMTP_PORT }}
        run: python check_changes.py

      # ── 4. Commit du CSV mis à jour + du log JSON ────────────────────────────
      - name: Commit updated baseline & diff log
        run: |
          git config user.name  "liliskane-bot"
          git config user.email "bot@liliskane-monitor"

          git add data/projets_liliskane.csv logs/

          # Commit uniquement s'il y a des changements
          if git diff --cached --quiet; then
            echo "Rien à committer — pas de changement de données."
          else
            DIFF_SUMMARY=$(python - <<'EOF'
import json, glob, os
logs = sorted(glob.glob("logs/diff_*.json"))
if logs:
    with open(logs[-1]) as f:
        d = json.load(f)
    print(f"[{d['date']}] +{len(d['nouveaux'])} nouveau(x), -{len(d['supprimes'])} supprimé(s), ~{len(d['modifies'])} modifié(s)")
else:
    print("mise à jour baseline")
EOF
)
            git commit -m "📊 $DIFF_SUMMARY"
            git push
            echo "✅ Commit poussé."
          fi
