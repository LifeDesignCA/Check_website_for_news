name: 🏠 Liliskane Daily Monitor

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC = 04:00 EST (Montréal)
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4
          fi

      # ── 3. Monitoring ────────────────────────────────────────────────────────
      - name: Run monitoring script
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # SMTP_HOST: ${{ secrets.SMTP_HOST }}
          # SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python check_changes.py

      # ── 4. Commit du CSV mis à jour + du log JSON ────────────────────────────
      - name: Commit updated baseline & diff log
        run: |
          git config user.name  "liliskane-bot"
          git config user.email "bot@lifedesign.ca"

          mkdir -p data logs
          git add data/ logs/

          if git diff --cached --quiet; then
            echo "Rien à committer — pas de changement de données."
          else
            # ── Écriture du script dans un fichier temporaire (évite le conflit <<'EOF' en YAML)
            cat > /tmp/summarize.py << 'PYEOF'
            import json, glob, sys
            logs = sorted(glob.glob("logs/diff_*.json"))
            if logs:
                try:
                    with open(logs[-1]) as f:
                        d = json.load(f)
                    print(f"[{d.get('date', 'N/A')}] +{len(d.get('nouveaux', []))} nouveau(x), -{len(d.get('supprimes', []))} supprimé(s), ~{len(d.get('modifies', []))} modifié(s)")
                except Exception:
                    print("Mise à jour des données")
            else:
                print("Mise à jour baseline")
            PYEOF
            
                        DIFF_SUMMARY=$(python /tmp/summarize.py)
                        git commit -m "📊 $DIFF_SUMMARY"
                        git pull origin main --rebase --autostash
                        git push origin main
                      fi
