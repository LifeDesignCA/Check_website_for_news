name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC correspond à 13:00 au Maroc (UTC+1)
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Assure-toi que ton secret contient les emails séparés par des virgules
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit and Push changes
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@lifedesign.ca"
      
          mkdir -p data logs
      
          # 1️⃣ récupérer les changements distants d'abord
          git pull origin main --rebase
      
          # 2️⃣ ajouter les fichiers
          git add data/ logs/
      
          # 3️⃣ commit seulement si changements
          if git diff --cached --quiet; then
            echo "Aucun changement à enregistrer."
          else
            git commit -m "📊 Mise à jour des données Liliskane"
            git push origin main
          fi
