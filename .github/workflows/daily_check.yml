name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC correspond à 13:00 au Maroc (UTC+1)
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Assure-toi que ton secret contient les emails séparés par des virgules
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit and Push changes
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@lifedesign.ca"
          
          # On ajoute tout ce qui a été modifié (le -A inclut tout)
          git add -A
          
          # On vérifie s'il y a quelque chose à committer
          if git diff --cached --quiet; then
            echo "Aucun changement détecté."
          else
            git commit -m "📊 Mise à jour des données Liliskane"
            
            # LE SECRET : pull avec autostash pour gérer les fichiers restants
            git pull origin main --rebase --autostash
            
            git push origin main
          fi
