name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit and push changes
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@lifedesign.ca"

          # Créer .gitignore si absent
          grep -qxF '__pycache__/' .gitignore 2>/dev/null || echo '__pycache__/' >> .gitignore
          grep -qxF '*.pyc'        .gitignore 2>/dev/null || echo '*.pyc'        >> .gitignore

          # Retirer __pycache__ du tracking AVANT git add
          git rm -r --cached __pycache__/ 2>/dev/null || true

          git add -A

          if git diff --cached --quiet; then
            echo "Rien à enregistrer aujourd'hui."
          else
            git commit -m "📊 Mise à jour des données Liliskane — $(date +'%Y-%m-%d')"
            git pull origin main --rebase --autostash -X ours
            git push origin main
          fi
