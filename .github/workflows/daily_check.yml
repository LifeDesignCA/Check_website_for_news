name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC correspond à 13:00 au Maroc (UTC+1)
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Assure-toi que ton secret contient les emails séparés par des virgules
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit and Push changes
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@lifedesign.ca"
          
          # 1. On force l'ajout de tous les nouveaux fichiers (CSV et JSON)
          git add -A
          
          # 2. On vérifie s'il y a vraiment des changements à envoyer
          if git diff --cached --quiet; then
            echo "Rien à enregistrer aujourd'hui."
          else
            # 3. On crée le commit localement
            git commit -m "📊 Mise à jour des données Liliskane"
            
            # 4. LE FIX : On synchronise avec le serveur en mode 'autostash'
            # Cela met de côté les fichiers temporaires, fusionne, et remet tout en place
            git pull origin main --rebase --autostash
            
            # 5. On envoie enfin les fichiers sur ton dépôt
            git push origin main
          fi
            echo "Aucun changement à enregistrer."
          else
            git commit -m "📊 Mise à jour des données Liliskane"
            git push origin main
          fi
