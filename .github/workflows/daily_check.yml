name: Liliskane Daily Monitor

on:
  schedule:
    - cron: '0 12 * * *'   # 8h UTC = 9h Maroc (GMT+1)
  workflow_dispatch:        # Lancement manuel depuis l'onglet Actions

# ✅ CORRECTION #1 : permission d'écriture obligatoire pour git push
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # ✅ CORRECTION #2 : persist-credentials=true (défaut, mais explicite)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      # ✅ CORRECTION #3 : commit et push des fichiers générés
      - name: Commit & push data + logs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/projets_liliskane.csv logs/
          
          # Seulement committer s'il y a des changements
          if git diff --staged --quiet; then
            echo "✅ Aucun changement à committer"
          else
            git commit -m "🤖 Auto-update $(date +'%Y-%m-%d') — baseline + logs"
            git push
          fi
