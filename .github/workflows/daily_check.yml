name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests beautifulsoup4; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit updated baseline & diff log
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@liliskane-monitor"
          
          # Vérifier si les dossiers existent avant d'ajouter
          mkdir -p data logs
          git add data/ logs/ || true

          if git diff --cached --quiet; then
            echo "Rien à committer — pas de changement de données."
          else
            DIFF_SUMMARY=$(python - <<'EOF'
import json, glob, os
logs = sorted(glob.glob("logs/diff_*.json"))
if logs:
    try:
        with open(logs[-1]) as f:
            d = json.load(f)
        print(f"[{d.get('date', 'N/A')}] +{len(d.get('nouveaux', []))} nouveau(x), -{len(d.get('supprimes', []))} supprimé(s)")
    except:
        print("Mise à jour des données")
else:
    print("Mise à jour baseline")
EOF
)
            git commit -m "📊 $DIFF_SUMMARY"
            git push
            echo "✅ Commit poussé."
          fi
