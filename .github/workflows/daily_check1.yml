name: "🏠 Liliskane Daily Monitor"

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Scrape & Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitoring script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python check_changes.py

      - name: Commit changes
        run: |
          git config user.name "liliskane-bot"
          git config user.email "bot@liliskane-monitor"
          mkdir -p data logs
          git add data/ logs/
          if git diff --cached --quiet; then
            echo "Pas de changements."
          else
            git commit -m "📊 Mise à jour des données Liliskane"
            git push
          fi
